<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Love Envelope</title>
    <link rel="stylesheet" href="./style.css">
    <style>

    </style>
</head>

<body>
    <div class="contains">
        <div class="wrapper v1" id="wrapper" onclick="toggleLetter()">
            <div class="envelope">
                <div class="letter" id="letter">
                    Happy 8/3
                    <br>
                    Nguyễn Thúy Lan
                </div>
                <div class="left-fold"></div>
                <div class="right-fold"></div>
                <div class="flap"></div>
                <div class="flap-bottom"></div>
                <div class="heart"></div>
                <div class="flowers">
                    <img src="images/flower1.png" alt="" class="flower flower-left">
                    <img src="images/flower1.png" alt="" class="flower flower-right">
                    <img src="images/flower2.png" alt="" class="flower flower-preview">
                    <img src="images/khung.png" alt="" class="layout">
                    <img src="images/tl.jpg" alt="" class="layout avatar">
                </div>
                <div class="butterflys">
                    <img src="images/butterfly.png" alt="" class="butterfly butterfly-left">
                    <img src="images/butterfly.png" alt="" class="butterfly butterfly-right">
                </div>
            </div>
        </div>
    </div>


    <script>
        function toggleLetter() {
            const wrapper = document.getElementById("wrapper");
            if (!wrapper.classList.contains("open")) {
                wrapper.classList.add("open");
            } else {
                const letter = document.getElementById("letter");
                letter.innerHTML = "";
                setTimeout(() => {
                    typeWriter(letter, text, 40);
                }, 1800);
                wrapper.classList.remove("v1");
                wrapper.classList.add("v2");
            }
        }
        const text = "Chúc mừng ngày phụ nữ Việt Nam 8/3 Chúc bạn Thuý Lan có một ngày nghỉ lễ trọn vẹn , luôn luôn vui vẻ và có thể cười tươi mỗi ngày Chúc bạn Thuý Lan ngày càng xinh đẹp ,mặc dù xinh không phải bàn rồi =))) Và đặc biệt là phải thật hạnh phúc an nhiên , bao nhiêu hạnh phúc trên đời đều là của bạn, mỗi ngày trôi qua đều là một ngày hạnh phúc < 3"

        function typeWriter(element, text, speed = 40) {
            let i = 0;
            function type() {
                if (i < text.length) {
                    const char = text.charAt(i);
                    element.innerHTML += char === "\n" ? "<br>" : char;
                    i++;
                    setTimeout(type, speed);
                }
            }
            type();
        }
    </script>

</body>

</html>
