<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Happy 8/3</title>
    <link rel="stylesheet" href="./style.css">
    <style>

    </style>
</head>

<body>
    <div class="contains">
        <div class="wrapper v1" id="wrapper" onclick="toggleLetter()">
            <div class="envelope">
                <div class="letter" id="letter">
                    Happy 8/3
                    <br>
                    Trần Minh Hương
                </div>
                <div class="left-fold"></div>
                <div class="right-fold"></div>
                <div class="flap"></div>
                <div class="flap-bottom"></div>
                <div class="heart"></div>
                <div class="flowers">
                    <img src="images/flower1.webp" alt="" class="flower flower-left">
                    <img src="images/flower1.webp" alt="" class="flower flower-right">
                    <img src="images/flower2.webp" alt="" class="flower flower-preview">
                    <img src="images/khung.webp" alt="" class="layout">
                    <img src="images/avatar.jfif" alt="" class="layout avatar">
                </div>
                <div class="butterflys">
                    <img src="images/butterfly.webp" alt="" class="butterfly butterfly-left">
                    <img src="images/butterfly.webp" alt="" class="butterfly butterfly-right">
                </div>
            </div>
        </div>
    </div>


    <script>
        function toggleLetter() {
            const wrapper = document.getElementById("wrapper");
            if (!wrapper.classList.contains("open")) {
                wrapper.classList.add("open");
            } else if (wrapper.classList.contains("v1")) {
                const letter = document.getElementById("letter");
                letter.innerHTML = "";
                setTimeout(() => {
                    typeWriter(letter, text, 40, () => {
                        letter.innerHTML += "<br>Ký tên<br> Siri";
                    });
                }, 1700);
                wrapper.classList.remove("v1");
                wrapper.classList.add("v2");
            }
        }
        const text = "Nhân ngày 8/3, anh muốn gửi đến em những lời chúc tốt đẹp và chân thành nhất. Cảm ơn em vì đã đến bên anh và mang lại cho anh rất nhiều niềm vui, sự ấm áp và hạnh phúc trong cuộc sống. Mỗi ngày có em bên cạnh đều trở nên đặc biệt hơn đối với anh. Chỉ cần nhìn thấy nụ cười của em thôi cũng đủ làm anh cảm thấy mọi thứ thật ý nghĩa. Chúc em một ngày 8/3 thật hạnh phúc. Anh yêu em rất nhiều."

        function typeWriter(element, text, speed = 40, onComplete) {
            let i = 0;
            function type() {
                if (i < text.length) {
                    const char = text.charAt(i);
                    element.innerHTML += char === "\n" ? "<br>" : char;
                    i++;
                    setTimeout(type, speed);
                } else if (onComplete) {
                    onComplete();
                }
            }
            type();
        }
    </script>

</body>

</html>
